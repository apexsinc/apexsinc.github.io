<div class="social-icons">
  <div class="social-icons-right">
    <a href="https://m.me/{{ site.fbmessenger_username }}" target="_blank">
        <img alt="Messenger link"
        src="{{ site.url }}{{ assets['fbmessenger.png'].digest_path }}"
        srcset="{{ site.url }}{{ assets['fbmessenger.png'].digest_path }} 1x, {{ site.url }}{{ assets['fbmessenger@2x.png'].digest_path }} 2x"
        >
    </a>
    <a href="/feed.xml">
      <img alt="RSS link"
      src="{{ site.url }}{{ assets['rss.png'].digest_path }}"
      srcset="{{ site.url }}{{ assets['rss.png'].digest_path }} 1x, {{ site.url }}{{ assets['rss@2x.png'].digest_path }} 2x"
      >
    </a>
  </div>
</div>
<div class="clearfix"></div>
